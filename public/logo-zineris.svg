<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 160" width="820" height="160">
  <defs>
    <!-- Fond bleu marine -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2540"/>
      <stop offset="100%" stop-color="#141a2e"/>
    </linearGradient>

    <!-- Effet métallique argent -->
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8eaf0"/>
      <stop offset="18%"  stop-color="#c8ccd8"/>
      <stop offset="35%"  stop-color="#f4f5f8"/>
      <stop offset="50%"  stop-color="#9aa0b4"/>
      <stop offset="65%"  stop-color="#e2e4ec"/>
      <stop offset="80%"  stop-color="#b0b6c8"/>
      <stop offset="100%" stop-color="#8890a8"/>
    </linearGradient>

    <!-- Reflet biseauté côté gauche (ombre portée) -->
    <linearGradient id="shadowLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4a5068" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4a5068" stop-opacity="0"/>
    </linearGradient>

    <!-- Filtre ombre douce -->
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="820" height="160" fill="url(#bgGrad)"/>

  <!-- Texture subtile fond -->
  <rect width="820" height="160" fill="url(#bgGrad)" opacity="0.6"/>

  <!-- Texte ZINERIS métallique -->
  <text
    x="50%"
    y="50%"
    dy="0.38em"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
    font-weight="900"
    font-size="118"
    letter-spacing="12"
    fill="url(#metalGrad)"
    filter="url(#softShadow)"
    style="text-transform:uppercase;"
  >ZINERIS</text>

  <!-- Reflet biseauté côté gauche de chaque lettre (effet 3D) -->
  <text
    x="50%"
    y="50%"
    dy="0.38em"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
    font-weight="900"
    font-size="118"
    letter-spacing="12"
    fill="none"
    stroke="#6a7090"
    stroke-width="1"
    opacity="0.4"
    style="text-transform:uppercase;"
  >ZINERIS</text>
</svg>